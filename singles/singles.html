<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- CSS & JS Functionalities for the 1-player game -->
  <script type="text/javascript" src="singles.js"></script>
  <link rel="stylesheet" href="singles.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

  <title>tic-tac-toe</title>
  <link rel="icon" href="../images/favicon1-1.JPG" alt="icon">
</head>

<body>
  <section class="title">
    <h1>Tic Tac Toe</h1>
  </section>

  <div class="score">Player:<span class="playerScore">0</span> Computer:<span class="computerScore">0</span></div>

  <div class="tictactoe-board">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script>
      for (var i = 0; i < 3; i++) {
        document.write('<div class="board-row">');
        for (var j = 0; j < 3; j++) {
          document.write('<div class="board-cell cell-');
          document.write(i + '-' + j);
          document.write('">' + "&nbsp" + '</div>');
        };
        document.write('</div>');
      };
    </script>
  </div>

  <div class="message">
    Message: <span class="message-text">&nbsp;</span>
  </div>

  <!-- Game Home Page -->
  <section class="controls">
    <a href="../index.html">
      <button class="home">Home</button>
    </a>
  </section>
</body>

</html>
